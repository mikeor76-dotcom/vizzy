<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vizzy — Asset Gallery</title>
    <style>
      :root {
        --bg: #0b0b12;
        --fg: #e8e8f0;
        --muted: #8a8aa0;
        --accent: #7c5cff;
        --panel: #16161f;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 28px;
      }
      h1 { font-size: 22px; margin-bottom: 4px; }
      p.sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
      h2 {
        font-size: 15px;
        margin: 28px 0 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 16px; }
      .card {
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 10px;
        overflow: hidden;
      }
      .card.disabled { opacity: 0.45; }
      .card img { width: 100%; aspect-ratio: 3 / 1; object-fit: cover; display: block; background: #000; }
      .card .info { padding: 10px 12px 12px; }
      .row1 { display: flex; align-items: baseline; gap: 8px; }
      .num {
        font-weight: 700;
        color: var(--accent);
        font-size: 15px;
        font-variant-numeric: tabular-nums;
      }
      .title { font-weight: 600; font-size: 14px; }
      .badges { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 5px; }
      .badge {
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--muted);
      }
      .badge.hero { background: rgba(124, 92, 255, 0.25); color: #b8a5ff; }
      .badge.off { background: rgba(255, 90, 90, 0.18); color: #ff9d9d; }
      .path { margin-top: 6px; font-size: 11px; color: var(--muted); font-family: monospace; word-break: break-all; }
      .err { color: #ff9d9d; font-family: monospace; margin-top: 20px; }
    </style>
  </head>
  <body>
    <h1>Vizzy asset gallery</h1>
    <p class="sub">
      Every plate in <code>assets/galaxy/manifest.json</code>. Faded cards are disabled. Refer to plates by
      their <span style="color: #b8a5ff">number</span> or title.
    </p>
    <div id="root"></div>
    <script>
      const root = document.getElementById("root");
      fetch("/assets/galaxy/manifest.json")
        .then((r) => r.json())
        .then((m) => {
          let n = 0;
          for (const [section, list] of [["Galaxy plates", m.galaxy || []], ["Event Horizon plates", m.eventHorizon || []]]) {
            const h = document.createElement("h2");
            h.textContent = `${section} (${list.length})`;
            root.appendChild(h);
            const grid = document.createElement("div");
            grid.className = "grid";
            root.appendChild(grid);
            for (const e of list) {
              n++;
              const off = e.enabled === false;
              const card = document.createElement("div");
              card.className = "card" + (off ? " disabled" : "");
              const badges = [
                e.mood || e.category,
                "p" + (e.priority ?? 5),
                e.sourceType,
                e.hero ? "hero" : null,
                off ? "DISABLED" : null,
              ].filter(Boolean);
              card.innerHTML = `
                <img loading="lazy" src="${e.path.startsWith("/") ? e.path : "/assets/galaxy/" + e.path}" alt="" onerror="this.style.outline='2px solid #ff5a5a'" />
                <div class="info">
                  <div class="row1"><span class="num">#${n}</span><span class="title">${e.title || e.path}</span></div>
                  <div class="badges">${badges
                    .map((b) => `<span class="badge${b === "hero" ? " hero" : b === "DISABLED" ? " off" : ""}">${b}</span>`)
                    .join("")}</div>
                  <div class="path">${e.path}</div>
                </div>`;
              grid.appendChild(card);
            }
          }
        })
        .catch((e) => {
          root.innerHTML = `<div class="err">Failed to load manifest.json: ${e}</div>`;
        });
    </script>
  </body>
</html>
