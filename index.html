<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vizzy — Audio Visualizer</title>
    <link rel="stylesheet" href="/src/style.css" />
    <!-- boot/loading splash: shown the instant the page parses (before the JS
         bundle + first canvas frame), then faded out by main.js. Inline here so
         it applies with zero dependency on the external stylesheet — no white
         flash while Chromium loads the app on the Pi. -->
    <style>
      html { background: #000; } /* pre-CSS anti-flash; app's own --bg still styles <body> */
      #splash {
        position: fixed; inset: 0; z-index: 9999; background: #000;
        display: flex; align-items: center; justify-content: center;
        opacity: 1; transition: opacity 650ms ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash img { width: 100%; height: 100%; object-fit: contain; }
      /* release identity, stamped at build (vite.config.js) — the proof an
         update landed, visible from the first paint */
      #splash-version {
        position: absolute; right: 14px; bottom: 10px;
        font: 12px ui-monospace, Menlo, monospace; color: rgba(160, 170, 190, 0.55);
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/vizzy-splash.png" alt="Vizzy" />
      <div id="splash-version">__VIZZY_VERSION_LABEL__</div>
    </div>
    <canvas id="canvas"></canvas>

    <div id="hint">
      <h1>Vizzy</h1>
      <p>Start the microphone to begin visualizing.</p>
      <p class="keys">&larr;&rarr; mode &nbsp;&middot;&nbsp; &uarr;&darr; category &nbsp;&middot;&nbsp; F favorite &nbsp;&middot;&nbsp; H controls &nbsp;&middot;&nbsp; Space mic</p>
    </div>

    <!-- hi-fi style feedback overlay, shown briefly on any control change -->
    <div id="overlay" aria-live="polite"></div>

    <!-- debug/dev control panel; contents are rendered from the registry.
         Hidden with the H key for the clean full-screen device experience. -->
    <div id="controls">
      <button id="controls-close" title="Close controls (H)" aria-label="Close controls">&times;</button>
      <div class="panel-row">
        <button class="btn" id="mic-btn">Start Mic</button>
        <div class="divider"></div>
        <div class="cat-group" id="cat-group"></div>
        <div class="divider"></div>
        <div class="action-group" id="action-group"></div>
        <span id="now-playing"></span>
      </div>
      <div class="panel-row">
        <div class="mode-group" id="mode-group"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
